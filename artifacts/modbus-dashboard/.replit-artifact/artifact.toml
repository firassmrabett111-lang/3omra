kind = "web"
previewPath = "/"
title = "MODBUS TCP/IP Dashboard"
version = "1.0.0"
id = "artifacts/modbus-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20123

[services.development]
run = "pnpm --filter @workspace/modbus-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/modbus-dashboard", "run", "build" ]
publicDir = "artifacts/modbus-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20123"
BASE_PATH = "/"
